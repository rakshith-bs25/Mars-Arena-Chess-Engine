name: CI Pipeline for Microservices

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_COMPOSE_VERSION: 2.20.3

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # recommended by SonarQube for better analysis relevancy

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      # 1) Tests (do not skip)
      - name: Run tests (all Gradle modules)
        working-directory: ./three-player-chess
        env:
          POSTGRES_DB: chessdb
          POSTGRES_USER: chess
          POSTGRES_PASSWORD: chess
        run: ./gradlew clean test --info

      # 2) SonarQube scan (don’t rerun tests)
      - name: SonarQube Scan (all Gradle modules)
        working-directory: ./three-player-chess
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        run: ./gradlew sonar --info -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build each service
      - name: Build Backend Service
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ github.repository }}-backend:latest \
                       -t ${{ env.REGISTRY }}/${{ github.repository }}-backend:${{ github.sha }} \
                       ./three-player-chess

      - name: Build Gateway Service
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ github.repository }}-gateway:latest \
                       -t ${{ env.REGISTRY }}/${{ github.repository }}-gateway:${{ github.sha }} \
                       ./gateway-service

      - name: Build Frontend Service
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ github.repository }}-frontend:latest \
                       -t ${{ env.REGISTRY }}/${{ github.repository }}-frontend:${{ github.sha }} \
                       ./web-frontend

      - name: Push Docker images
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.REGISTRY }}/${{ github.repository }}-backend:latest
          docker push ${{ env.REGISTRY }}/${{ github.repository }}-backend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ github.repository }}-gateway:latest
          docker push ${{ env.REGISTRY }}/${{ github.repository }}-gateway:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ github.repository }}-frontend:latest
          docker push ${{ env.REGISTRY }}/${{ github.repository }}-frontend:${{ github.sha }}
