spring.application.name=three-player-service
server.port=8081

# --- Persistence ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:chessdb}
spring.datasource.username=${DB_USER:chess}
spring.datasource.password=${DB_PASSWORD:chess}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

