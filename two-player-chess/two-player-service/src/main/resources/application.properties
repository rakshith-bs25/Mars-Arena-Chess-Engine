spring.application.name=two-player-service
server.port=8082

# Database Connection
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:chessdb}
spring.datasource.username=${DB_USER:chess}
spring.datasource.password=${DB_PASSWORD:chess}

# JPA Settings
# FIX: Change 'validate' to 'update' so Hibernate creates the missing tables automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# UNIQUE Flyway table to avoid collision
spring.flyway.table=flyway_schema_history_2d
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# Ensure Flyway runs BEFORE Hibernate tries to initialize
spring.flyway.baseline-version=0